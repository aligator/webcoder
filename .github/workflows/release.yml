name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  flatpak:
    name: build Flatpak bundle
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          python3 - "$VERSION" <<'PY'
          import sys
          import xml.etree.ElementTree as ET
          from datetime import date
          from pathlib import Path

          version = sys.argv[1]
          path = Path("flatpak/dev.webcoder.app.metainfo.xml")
          tree = ET.parse(path)
          root = tree.getroot()
          releases = root.find("releases")
          if releases is None:
              releases = ET.SubElement(root, "releases")
          for release in list(releases):
              releases.remove(release)
          ET.SubElement(releases, "release", {"version": version, "date": date.today().isoformat()})
          ET.indent(tree, space="  ")
          tree.write(path, encoding="UTF-8", xml_declaration=True)
          PY

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: webcoder-${{ steps.version.outputs.version }}.flatpak
          manifest-path: flatpak/dev.webcoder.app.yml
          cache-key: flatpak-builder-${{ github.sha }}
          verbose: true

      - name: Upload Flatpak bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: webcoder-${{ steps.version.outputs.version }}.flatpak
