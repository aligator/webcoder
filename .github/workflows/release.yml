name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tauri:
    name: build desktop bundles (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
          - name: linux-arm64
            os: ubuntu-24.04-arm
          - name: macos-x86_64
            os: macos-13
          - name: macos-arm64
            os: macos-latest
          - name: windows-x86_64
            os: windows-latest
          - name: windows-arm64
            os: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install Trunk and Tauri CLI
        run: |
          cargo install trunk --locked
          cargo install tauri-cli --version "^2" --locked

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Bundling version $VERSION"
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version=process.argv[1];require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')" "$VERSION"

      - name: Build Tauri desktop
        run: cargo tauri-build

      # Only the bundles that exist on each runner are picked up; the other
      # globs match nothing (fail_on_unmatched_files defaults to false).
      - name: Upload Tauri bundles to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/bundle/dmg/*.dmg
            target/release/bundle/nsis/*-setup.exe
            target/release/bundle/msi/*.msi

  flatpak:
    name: build Flatpak bundle
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: webcoder.flatpak
          manifest-path: flatpak/dev.webcoder.app.yml
          cache-key: flatpak-builder-${{ github.sha }}
          verbose: true

      - name: Upload Flatpak bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: webcoder.flatpak
