name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust + wasm checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: swatinem/rust-cache@v2

      - name: Check native app
        run: cargo check -p webcoder-desktop --bin webcoder --locked

      - name: Check wasm frontend
        run: cargo check -p webcoder-frontend --target wasm32-unknown-unknown --bin webcoder-frontend --locked

      - name: Test core
        run: cargo test -p webcoder-frontend --locked

  tauri:
    name: tauri linux bundle
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            src-tauri -> target

      - name: Install Linux and Tauri prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            ffmpeg

      - name: Install Trunk and Tauri CLI
        run: |
          cargo install trunk --locked
          cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri desktop
        run: cargo tauri-build

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux-x86_64
          path: target/release/bundle/**
          if-no-files-found: error

  flatpak:
    name: flatpak bundle
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: webcoder.flatpak
          manifest-path: flatpak/dev.webcoder.app.yml
          cache-key: flatpak-builder-${{ github.sha }}
          verbose: true
