name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: rust + wasm checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: swatinem/rust-cache@v2

      - name: Install native (Tauri) prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Stub frontend dist
        # Tauri's build script validates that the `../dist` bundle resource
        # exists. A compile check doesn't need the real assets, just the dir.
        run: mkdir -p dist

      - name: Check native app
        run: cargo check -p webcoder-desktop --bin webcoder --locked

      - name: Check wasm frontend
        run: cargo check -p webcoder-frontend --target wasm32-unknown-unknown --bin webcoder-frontend --locked

      - name: Test core
        run: cargo test -p webcoder-frontend --locked
