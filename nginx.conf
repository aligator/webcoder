worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # WASM must be served with the correct MIME type for streaming compile.
    types {
        application/wasm wasm;
    }

    # Writable temp paths so the container can run as an unprivileged user.
    client_body_temp_path /tmp/nginx-client;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    server_tokens off;

    # Uploads happen client-side; keep body small (only static serving here).
    client_max_body_size 1m;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    server {
        listen 8080;
        listen [::]:8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Content-hashed assets (trunk fingerprints filenames) — cache forever.
        location ~* \.(wasm|js|css|woff2?|png|jpg|jpeg|gif|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # HTML entrypoint — never cache, so new deploys are picked up.
        location = /index.html {
            add_header Cache-Control "no-cache";
        }

        # SPA fallback for client-side routing.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Basic security headers.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
