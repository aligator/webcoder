app-id: dev.aligator.webcoder
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: webcoder-flatpak

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-download

build-options:
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/webcoder/cargo
    RUSTUP_HOME: /run/build/webcoder/rustup
    PATH: /run/build/webcoder/cargo/bin:/usr/bin:/bin

modules:
  # FFmpeg and its codec libraries are built from source and bundled, so the
  # app is self-contained (no host FFmpeg, no flatpak-spawn).
  - name: x264
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app --enable-shared --disable-cli --enable-pic
      - make -j$(nproc)
      - make install
    sources:
      - type: git
        url: https://code.videolan.org/videolan/x264.git
        commit: b35605ace3ddf7c1a5d67a2eb553f034aef41d55

  - name: x265
    buildsystem: simple
    build-commands:
      # x265 still calls cmake_policy(SET CMP00xx OLD) for policies whose OLD
      # behavior CMake 4 removed, which aborts configuration. Drop those lines;
      # CMake's default (NEW) behavior is fine here.
      - sed -i '/cmake_policy(SET CMP0025 OLD)/d;/cmake_policy(SET CMP0054 OLD)/d' source/CMakeLists.txt
      - cmake -GNinja -S source -B build -DCMAKE_INSTALL_PREFIX=/app -DCMAKE_BUILD_TYPE=Release -DENABLE_CLI=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - ninja -C build
      - ninja -C build install
    sources:
      - type: archive
        url: https://bitbucket.org/multicoreware/x265_git/downloads/x265_4.0.tar.gz
        sha256: 75b4d05629e365913de3100b38a459b04e2a217a8f30efaa91b572d8e6d71282

  - name: libvpx
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app --enable-shared --disable-static --disable-examples --disable-tools --disable-docs --enable-vp8 --enable-vp9 --enable-pic
      - make -j$(nproc)
      - make install
    sources:
      - type: archive
        url: https://github.com/webmproject/libvpx/archive/refs/tags/v1.14.1.tar.gz
        sha256: 901747254d80a7937c933d03bd7c5d41e8e6c883e0665fadcb172542167c7977

  - name: opus
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://downloads.xiph.org/releases/opus/opus-1.5.2.tar.gz
        sha256: 65c1d2f78b9f2fb20082c38cbe47c951ad5839345876e46941612ee87f9a7ce1

  - name: lame
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --disable-frontend
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz
        sha256: ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e

  - name: ffmpeg
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app --enable-shared --disable-static --enable-gpl
        --enable-version3 --enable-libx264 --enable-libx265 --enable-libvpx
        --enable-libopus --enable-libmp3lame --disable-doc --disable-debug
      - make -j$(nproc)
      - make install
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-7.1.tar.xz
        sha256: 40973d44970dbc83ef302b0609f2e74982be2d85916dd2ee7472d30678a7abe6

  - name: webcoder
    buildsystem: simple
    build-commands:
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable --target wasm32-unknown-unknown
      - cargo install trunk --locked
      - trunk build
      - cargo build --manifest-path src-tauri/Cargo.toml --release --locked --bin webcoder
      - install -Dm755 target/release/webcoder /app/bin/webcoder
      - install -Dm755 flatpak/webcoder-flatpak /app/bin/webcoder-flatpak
      - install -d /app/share/webcoder/dist
      - cp -r dist/. /app/share/webcoder/dist/
      - install -Dm644 flatpak/dev.aligator.webcoder.desktop /app/share/applications/dev.aligator.webcoder.desktop
      - install -Dm644 flatpak/dev.aligator.webcoder.metainfo.xml /app/share/metainfo/dev.aligator.webcoder.metainfo.xml
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/32x32/apps/dev.aligator.webcoder.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/dev.aligator.webcoder.png
    sources:
      - type: dir
        path: ..
